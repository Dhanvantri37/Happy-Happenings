version: "3.9"

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: hhm-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - hhm-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Node / Express API ───────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hhm-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/happyhappenings
      JWT_SECRET: hhm_super_secret_jwt_key_change_in_production
      RAZORPAY_KEY_ID: rzp_test_demo
      RAZORPAY_KEY_SECRET: demo_secret
      PORT: 5000
      CLIENT_URL: http://localhost:3000
      SEED_ON_START: "true"
    ports:
      - "5000:5000"
    networks:
      - hhm-net

  # ── React / Nginx ─────────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_RAZORPAY_KEY_ID: rzp_test_demo
    container_name: hhm-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:80"
    networks:
      - hhm-net

volumes:
  mongo_data:

networks:
  hhm-net:
    driver: bridge
